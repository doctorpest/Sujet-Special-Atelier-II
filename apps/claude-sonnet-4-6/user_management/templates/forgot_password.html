{% extends 'base.html' %}
{% block title %}Mot de passe oublié — UserVault{% endblock %}
{% block content %}
<div class="card card-sm">
  <h1 class="card-title">Réinitialisation</h1>
  <p class="card-subtitle">Entrez votre email pour recevoir un lien de réinitialisation.</p>

  <form method="post">
    <div class="form-group">
      <label for="email">Adresse email</label>
      <input type="email" id="email" name="email" required autofocus placeholder="vous@exemple.com">
    </div>
    <button type="submit" class="btn btn-primary">Envoyer le lien</button>
  </form>

  <hr class="divider">
  <p class="text-center text-muted" style="font-size:.9rem;">
    <a href="{{ url_for('login') }}" class="link">← Retour à la connexion</a>
  </p>
</div>
{% endblock %}
