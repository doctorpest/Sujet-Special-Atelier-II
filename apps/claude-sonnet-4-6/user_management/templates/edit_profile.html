{% extends 'base.html' %}
{% block title %}Modifier le profil — UserVault{% endblock %}
{% block content %}
<div class="card card-sm">
  <h1 class="card-title">Modifier le profil</h1>
  <p class="card-subtitle">Mettez à jour vos informations personnelles.</p>

  <form method="post">
    <div class="form-group">
      <label for="full_name">Nom complet</label>
      <input type="text" id="full_name" name="full_name"
             value="{{ user['full_name'] }}" required autofocus>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" value="{{ user['email'] }}" disabled style="opacity:.6;cursor:not-allowed;">
      <small class="text-muted" style="font-size:.8rem;">L'email ne peut pas être modifié.</small>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:1rem;">
      <button type="submit" class="btn btn-primary" style="width:auto;flex:1;">Enregistrer</button>
      <a href="{{ url_for('profile') }}" class="btn btn-ghost" style="flex:1;text-align:center;">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
