{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Mon Profil</h4>
            </div>
            <div class="card-body">
                <p><strong>Nom Complet :</strong> {{ session['full_name'] }}</p>
                <p><strong>Email :</strong> {{ session['email'] }}</p>
                <p><strong>Rôle :</strong> <span class="badge bg-secondary">{{ session['role'] }}</span></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
