{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Réinitialiser le mot de passe</h3>
                <p class="text-muted text-center">Entrez votre adresse email. Si un compte existe, nous vous enverrons un lien.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Envoyer le lien</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
