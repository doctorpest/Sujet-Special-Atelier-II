{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Panneau d'Administration</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom Complet</th>
                    <th>Email</th>
                    <th>Rôle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user['id'] }}</td>
                    <td>{{ user['full_name'] }}</td>
                    <td>{{ user['email'] }}</td>
                    <td>
                        <form action="{{ url_for('change_role', user_id=user['id']) }}" method="POST" class="d-flex">
                            <select name="role" class="form-select form-select-sm me-2" style="width: auto;">
                                <option value="user" {% if user['role'] == 'user' %}selected{% endif %}>User</option>
                                <option value="admin" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary" {% if user['id'] == session['user_id'] %}disabled{% endif %}>Mettre à jour</button>
                        </form>
                    </td>
                    <td>
                        <form action="{{ url_for('delete_user', user_id=user['id']) }}" method="POST" onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?');">
                            <button type="submit" class="btn btn-sm btn-danger" {% if user['id'] == session['user_id'] %}disabled{% endif %}>Supprimer</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
