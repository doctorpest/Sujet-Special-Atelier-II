{% extends "base.html" %}
{% block title %}Profil{% endblock %}
{% block content %}
    <h2>Profil de {{ user.full_name }}</h2>
    <div class="card">
        <div class="card-body">
            <p><strong>Email :</strong> {{ user.email }}</p>
            <p><strong>Nom complet :</strong> {{ user.full_name }}</p>
            <p><strong>Rôle :</strong> {{ user.role }}</p>
            <p><strong>Date d'inscription :</strong> {{ user.created_at.strftime('%d/%m/%Y %H:%M') }}</p>
        </div>
    </div>
{% endblock %}
