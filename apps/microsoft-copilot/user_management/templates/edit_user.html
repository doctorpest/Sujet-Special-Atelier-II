{% extends "base.html" %}
{% block title %}Modifier utilisateur{% endblock %}
{% block content %}
<h2>Modifier l'utilisateur #{{ user.id }}</h2>
<p><strong>{{ user.full_name }}</strong> ({{ user.email }})</p>
<form method="post" class="mt-3">
    <div class="mb-3">
        <label for="role" class="form-label">Rôle</label>
        <select class="form-select" id="role" name="role">
            <option value="user" {% if user.role == 'user' %}selected{% endif %}>Utilisateur</option>
            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrateur</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{{ url_for('admin') }}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
